name: Build release artifacts

on:
  push:
    branches: [ main ]
    tags: [ 'v*', 'release-*' ]
  pull_request:
    types: [closed]
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create_tag_on_main:
    name: Create tag from package version (main)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' }}
    outputs:
      tag_created: ${{ steps.create_tag.outputs.tag_created }}
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "detected version: '$version'"
          if [ -z "$version" ]; then
            echo "error: package.json version is empty or could not be read"
            exit 1
          fi
          echo "version=$version"

      - name: Create and push tag (only for merged PR into main)
        id: create_tag
        run: |
          set -euo pipefail
          # This job only runs for merged PRs into main but validate event shape.
          if [ "$GITHUB_EVENT_NAME" != "pull_request" ]; then
            echo "Not a pull_request event; skipping"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pr_merged=$(jq -r .pull_request.merged < "$GITHUB_EVENT_PATH")
          base_ref=$(jq -r .pull_request.base.ref < "$GITHUB_EVENT_PATH")
          if [ "$pr_merged" != "true" ] || [ "$base_ref" != "main" ]; then
            echo "Not a merged PR into main; skipping"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version=$(node -p "require('./package.json').version")
          if [ -z "$version" ]; then
            echo "error: package.json version is empty or could not be read"
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          TAG="v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" = "$TAG" ]; then
            TAG_COMMIT=$(git rev-parse --verify "$TAG^{}" 2>/dev/null || true)
            if [ "$TAG_COMMIT" = "$GITHUB_SHA" ]; then
              echo "Tag $TAG already exists and points at this commit ($TAG_COMMIT). Will run build against it."
              echo "tag_created=true" >> $GITHUB_OUTPUT
              echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Tag $TAG already exists (points at $TAG_COMMIT), skipping creation."
            echo "tag_created=false" >> $GITHUB_OUTPUT
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Creating and pushing tag $TAG (previous: $LATEST_TAG)"
          git tag -a "$TAG" -m "Release $TAG"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY" "$TAG"
          echo "tag_created=true" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [create_tag_on_main]
    if: needs.create_tag_on_main.outputs.tag_created == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create_tag_on_main.outputs.tag_name }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/release/rds
          chmod +x "$BIN" || true
          if [ "${{ runner.os }}" = "Linux" ]; then PLATFORM=linux; else PLATFORM=macos; fi
          ARCH_RAW=$(uname -m)
          case "$ARCH_RAW" in
            aarch64|arm64) ARCH=arm64 ;;
            *) ARCH=$ARCH_RAW ;;
          esac
          ARCHIVE_NAME="rds-${PLATFORM}-${ARCH}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C target/release $(basename "$BIN")
          sha256sum "$ARCHIVE_NAME" | awk '{print $1 "  " $2}' > "${ARCHIVE_NAME}.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $bin = 'target\release\rds.exe'
          if (Test-Path $bin) {
            $proc = $env:PROCESSOR_ARCHITECTURE
            if ($proc -eq 'AMD64') { $arch = 'x64' }
            elseif ($proc -match 'ARM') { $arch = 'arm64' }
            else { $arch = $proc }
            $archive = "rds-windows-$arch.zip"
            Compress-Archive -Path $bin -DestinationPath $archive
            $hash = Get-FileHash $archive -Algorithm SHA256
            $hash.Hash + '  ' + $archive | Out-File ($archive + '.sha256') -Encoding ascii
          }

      - name: Verify packaged artifacts exist
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          shopt -s nullglob || true
          files=(rds-*.tar.gz rds-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No packaged artifacts found for ${{ matrix.os }}"
            exit 1
          else
            echo "Found artifacts: ${files[*]}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rds-${{ matrix.os }}
          path: |
            rds-*.tar.gz
            rds-*.zip

  # The release creation, signing and upload have been moved to a single
  # `publish_release` job which runs once after the matrix completes. This
  # avoids race conditions where multiple matrix runners try to create the
  # same release.

  publish_release:
    name: Publish release and upload artifacts
    runs-on: ubuntu-latest
    needs: [create_tag_on_main, build]
    if: needs.create_tag_on_main.outputs.tag_created == 'true'
    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4

      - name: Download all artifacts from matrix
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ needs.create_tag_on_main.outputs.tag_name }}
          release_name: ${{ needs.create_tag_on_main.outputs.tag_name }}
          body: 'Automated release artifacts'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts list
        run: |
          cd artifacts
          ls -la
          find . -type f -maxdepth 2 -print > ../artifact-list.txt

      - name: Import GPG key (if provided)
        id: import_gpg
        run: |
          if [ -z "${GPG_PRIVATE_KEY:-}" ]; then
            echo "no_key=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          export GNUPGHOME=$(mktemp -d)
          echo "$GPG_PRIVATE_KEY" > private.gpg
          chmod 600 private.gpg
          gpg --batch --import private.gpg
          echo "gnupghome=$GNUPGHOME" >> $GITHUB_OUTPUT
          echo "no_key=false" >> $GITHUB_OUTPUT
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign artifacts and checksums (if key imported)
        if: steps.import_gpg.outputs.no_key != 'true'
        run: |
          cd artifacts
          for f in $(cat ../artifact-list.txt); do
            if [ -f "$f" ]; then
              echo "Signing $f"
              if [ -n "${GPG_PASSPHRASE:-}" ]; then
                gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --detach-sign --armor -o "$f.asc" "$f" || exit 1
              else
                gpg --batch --yes --pinentry-mode loopback --detach-sign --armor -o "$f.asc" "$f" || exit 1
              fi
            fi
          done
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GNUPGHOME: ${{ steps.import_gpg.outputs.gnupghome }}

      - name: Upload each artifact to the release
        env:
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd artifacts
          while read -r f; do
            if [ -f "$f" ]; then
              echo "Uploading $f"
              curl -sS -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$UPLOAD_URL?name=$(basename "$f")"
            fi
          done < ../artifact-list.txt
          # Also upload signature files if present
          while read -r f; do
            if [ -f "$f.asc" ]; then
              echo "Uploading $f.asc"
              curl -sS -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$f.asc" "$UPLOAD_URL?name=$(basename "$f.asc")"
            fi
          done < ../artifact-list.txt

      - name: Cleanup sensitive files
        run: |
          rm -f private.gpg || true
          if [ -n "${GNUPGHOME:-}" ]; then rm -rf "$GNUPGHOME" || true; fi
          rm -f artifact-list.txt || true
        env:
          GNUPGHOME: ${{ steps.import_gpg.outputs.gnupghome }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

