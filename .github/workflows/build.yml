name: Build release artifacts

on:
  push:
    branches: [ main ]
    tags: [ 'v*', 'release-*' ]
  pull_request:
    types: [closed]
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create_tag_on_main:
    name: Create tag from package version (main)
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    outputs:
      tag_created: ${{ steps.create_tag.outputs.tag_created }}
      tag_name: ${{ steps.create_tag.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package.json version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "detected version: '$version'"
          if [ -z "$version" ]; then
            echo "error: package.json version is empty or could not be read"
            exit 1
          fi
          echo "version=$version"

      - name: Create and push tag (only if version changed)
        id: create_tag
        run: |
          set -e
          TAG="v${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" = "$TAG" ]; then
            echo "No version change detected (latest tag: $LATEST_TAG). Skipping tag creation."
            echo "tag_created=false" >> $GITHUB_OUTPUT
            echo "tag_name=$LATEST_TAG" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "Creating and pushing tag $TAG (previous: $LATEST_TAG)"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "tag_created=true" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [create_tag_on_main]
    if: needs.create_tag_on_main.outputs.tag_created == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create_tag_on_main.outputs.tag_name }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/release/rds
          chmod +x "$BIN" || true
          if [ "${{ runner.os }}" = "Linux" ]; then PLATFORM=linux; else PLATFORM=macos; fi
          ARCH_RAW=$(uname -m)
          case "$ARCH_RAW" in
            x86_64) ARCH=x64 ;;
            aarch64|arm64) ARCH=arm64 ;;
            *) ARCH=$ARCH_RAW ;;
          esac
          ARCHIVE_NAME="rds-${PLATFORM}-${ARCH}.tar.gz"
          tar -czf "$ARCHIVE_NAME" -C target/release $(basename "$BIN")
          sha256sum "$ARCHIVE_NAME" | awk '{print $1 "  " $2}' > "${ARCHIVE_NAME}.sha256"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $bin = 'target\release\rds.exe'
          if (Test-Path $bin) {
            $proc = $env:PROCESSOR_ARCHITECTURE
            if ($proc -eq 'AMD64') { $arch = 'x64' }
            elseif ($proc -match 'ARM') { $arch = 'arm64' }
            else { $arch = $proc }
            $archive = "rds-windows-$arch.zip"
            Compress-Archive -Path $bin -DestinationPath $archive
            $hash = Get-FileHash $archive -Algorithm SHA256
            $hash.Hash + '  ' + $archive | Out-File ($archive + '.sha256') -Encoding ascii
          }

      - name: Verify packaged artifacts exist
        if: matrix.os != 'windows-latest'
        run: |
          set -e
          shopt -s nullglob || true
          files=(rds-*.tar.gz rds-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No packaged artifacts found for ${{ matrix.os }}"
            exit 1
          else
            echo "Found artifacts: ${files[*]}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rds-${{ matrix.os }}
          path: |
            rds-*.tar.gz
            rds-*.zip

      - name: Create GitHub Release (on tag)
        id: create_release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: 'Automated release artifacts'
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Import GPG key (if provided)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" > ./private.gpg
            gpg --batch --import ./private.gpg
          else
            echo "No GPG key provided; skipping import"
          fi
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Sign artifacts (if GPG key present)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            for f in rds-*.tar.gz rds-*.zip; do
              if [ -f "$f" ]; then
                gpg --batch --yes --detach-sign --armor -o "$f.asc" "$f"
              fi
            done
          else
            echo "No GPG key provided; skipping signing"
          fi

      - name: Upload release assets (archive + checksum)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: |
            rds-*.tar.gz
            rds-*.zip
            rds-*.tar.gz.sha256
            rds-*.zip.sha256
          asset_name: ${{ github.run_id }}-${{ matrix.os }}-artifacts
          asset_content_type: application/octet-stream
